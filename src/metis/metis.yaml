psql_database:
  provider: "config"
  credentials:
    username: "metis_user"
    password: "metis_password"
    host: "localhost"
    port: 5432
    database_name: "metis_db"

metis_engine:
  max_token_length: 250000
  max_workers: 5
  triage_checkpoint_every: 50
  triage_tool_timeout_seconds: 12
  llm_max_retries: 5
  embed_dim: 3072
  # For the PostgreSQL backend, use pgvector halfvec storage automatically when
  # embed_dim exceeds normal vector HNSW limits. Set true or false to override.
  pgvector_use_halfvec: auto
  hnsw_kwargs:
    hnsw_m: 16
    hnsw_ef_construction: 64
    hnsw_ef_search: 40
    hnsw_dist_method: "vector_cosine_ops"
  reachability_confirmation_model: "gpt-5.5"
  reachability_reasoning_effort: "low"
  reachability_max_paths: 0
  reachability_max_paths_per_sink: 3
  reachability_max_path_length: 25
  reachability_source_functions: []
  reachability_security_functions: []
  reachability_domain_profiles: []
  reachability_domain_hints: []
  model_tools:
    max_rounds: 6

memory:
  enabled: false
  backend: "sqlite"
  location: ".metis/memory/metis_memory.sqlite3"

llm_provider:
  name: "openai"
  model: "gpt-5.5"
  # Optional for reasoning-capable models: use a value supported by the
  # configured provider/model. Can be overridden under query.
  # reasoning_effort: "medium"

# Optional — only needed when the index tool is enabled.
embedding_provider:
  name: "openai"
  code_embedding_model: "text-embedding-3-large"
  docs_embedding_model: "text-embedding-3-large"

query:
  similarity_top_k: 5
  max_tokens: 5000
  temperature: 0.0
